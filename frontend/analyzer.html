<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 Deck Analyzer - CR Analyzer</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/analyzer.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="navbar-logo">
                <span class="navbar-logo-icon">🏆</span>
                <span>CR Analyzer</span>
            </a>
            <ul class="navbar-menu">
                <li><a href="/" class="navbar-link">Home</a></li>
                <li><a href="/analyzer" class="navbar-link">Analyzer</a></li>
                <li><a href="/cards" class="navbar-link">Cards</a></li>
                <li><a href="/dashboard" class="navbar-link">Dashboard</a></li>
                <li><a href="/about" class="navbar-link">About</a></li>
            </ul>
            <button class="navbar-toggle">☰</button>
        </div>
    </nav>

    <main>
        <section class="analyzer-section">
            <div class="container">
                <h1 class="section-title">
                    DECK <span class="gradient-text">ANALYZER</span>
                </h1>
                <p class="section-subtitle">
                    Build your deck and get AI-powered analysis instantly
                </p>

                <!-- ── DECK BUILDER ────────────────────────────── -->
                <div class="analyzer-grid">
                    <div class="deck-builder glass-card">
                        <div class="builder-header">
                            <h3>🃏 Your Deck</h3>
                            <span class="deck-counter">
                                <span id="deckCount">0</span> / 8
                            </span>
                        </div>

                        <!-- 8 Deck Slots -->
                        <div class="deck-slots" id="deckSlots">
                            <!-- Generated by JS -->
                        </div>

                        <div class="builder-actions">
                            <button class="btn btn-ghost btn-sm" id="clearDeck">
                                🗑️ Clear
                            </button>
                            <button class="btn btn-ghost btn-sm" id="randomDeck">
                                🎲 Random
                            </button>
                        </div>

                        <button class="btn btn-primary btn-lg" id="analyzeBtn" disabled>
                            🚀 Analyze Deck
                        </button>
                    </div>

                    <!-- ── CARD PICKER ─────────────────────────── -->
                    <div class="card-picker glass-card">
                        <div class="picker-header">
                            <h3>Pick Cards</h3>
                            <input 
                                type="text" 
                                class="input" 
                                id="cardSearch" 
                                placeholder="🔍 Search cards..."
                            >
                        </div>

                        <div class="picker-filters">
                            <button class="filter-btn active" data-filter="all">All</button>
                            <button class="filter-btn" data-filter="Common">Common</button>
                            <button class="filter-btn" data-filter="Rare">Rare</button>
                            <button class="filter-btn" data-filter="Epic">Epic</button>
                            <button class="filter-btn" data-filter="Legendary">Legendary</button>
                            <button class="filter-btn" data-filter="Champion">Champion</button>
                        </div>

                        <div class="cards-pool" id="cardsPool">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>

                <!-- ── RESULTS ────────────────────────────────── -->
                <div class="analysis-results" id="analysisResults" style="display: none;">
                    <h2 class="section-title mt-6">
                        📊 ANALYSIS <span class="gradient-text">RESULTS</span>
                    </h2>

                    <div id="resultsContent"></div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p class="footer-text">Made with ❤️ | Powered by ML</p>
        </div>
    </footer>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/navbar.js"></script>
    <script src="/static/js/analyzer.js"></script>
</body>
</html>
