<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Dashboard - CR Analyzer</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="navbar-logo">
                <span class="navbar-logo-icon">🏆</span>
                <span>CR Analyzer</span>
            </a>
            <ul class="navbar-menu">
                <li><a href="/" class="navbar-link">Home</a></li>
                <li><a href="/analyzer" class="navbar-link">Analyzer</a></li>
                <li><a href="/cards" class="navbar-link">Cards</a></li>
                <li><a href="/dashboard" class="navbar-link">Dashboard</a></li>
                <li><a href="/about" class="navbar-link">About</a></li>
            </ul>
            <button class="navbar-toggle">☰</button>
        </div>
    </nav>

    <main>
        <section>
            <div class="container">
                <h1 class="section-title">
                    META <span class="gradient-text">DASHBOARD</span>
                </h1>
                <p class="section-subtitle">
                    Real-time analytics and game-wide statistics
                </p>

                <div class="dashboard-grid">
                    <div class="chart-card glass-card">
                        <h3>🔥 Top 10 Most Used Cards</h3>
                        <canvas id="popularChart"></canvas>
                    </div>
                    <div class="chart-card glass-card">
                        <h3>🏆 Top 10 Win Rate Cards</h3>
                        <canvas id="winRateChart"></canvas>
                    </div>
                    <div class="chart-card glass-card">
                        <h3>🎯 Archetype Distribution</h3>
                        <canvas id="archetypeChart"></canvas>
                    </div>
                    <div class="chart-card glass-card">
                        <h3>📈 Meta Trends</h3>
                        <canvas id="trendsChart"></canvas>
                    </div>
                </div>

                <div class="top-decks-section glass-card">
                    <h3>🏆 Top Performing Decks</h3>
                    <div class="top-decks-list" id="topDecksList">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p class="footer-text">Made with ❤️ | Powered by ML</p>
        </div>
    </footer>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/navbar.js"></script>
    <script src="/static/js/dashboard.js"></script>
</body>
</html>
